name: V2ray Subscription Filter & Merge

on:
  schedule:
    # Her saat başı çalışır (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # Manuel tetikleme için
  push:
    branches: [ main, master ]

jobs:
  filter-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Filter & Merge Script
        run: |
          python3 << 'PYTHON_SCRIPT'
          import base64
          import json
          import re
          import sys
          import os
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import urllib.request
          import ssl

          # ==========================================
          # KAYNAK LİNKLERİ
          # ==========================================
          URLS = [
              "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
              "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt",
          ]

          # SSL hatalarını önlemek için gevşek context
          ssl_ctx = ssl.create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = ssl.CERT_NONE

          def fetch_url(url):
              """URL'yi eşzamanlı olarak indirir, hata olursa boş string döner."""
              try:
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                  })
                  with urllib.request.urlopen(req, timeout=60, context=ssl_ctx) as response:
                      return response.read().decode('utf-8', errors='replace')
              except Exception as e:
                  print(f"⚠ UYARI: {url} indirilemedi: {e}", file=sys.stderr)
                  return ""

          def is_port_80_or_443_vmess(line):
              """vmess:// için base64 decode + JSON parse ile port kontrolü."""
              try:
                  b64_data = line[8:].strip()
                  # Base64 padding eksikliklerini düzelt
                  missing_padding = len(b64_data) % 4
                  if missing_padding:
                      b64_data += '=' * (4 - missing_padding)
                  decoded = base64.b64decode(b64_data).decode('utf-8', errors='replace')
                  data = json.loads(decoded)
                  port = str(data.get('port', '')).strip()
                  return port in ('80', '443')
              except Exception:
                  # Bozuk veya hatalı vmess linklerini sessizce atla
                  return False

          def is_port_80_or_443_other(line):
              """
              vless, trojan, ss, hysteria2, hy2, tuic için gelişmiş port ayrıştırma.
              Etiket (#tag) veya parametrelerde (?param) geçen yanıltıcı sayıları yok sayar.
              Sadece @host:port kısmındaki gerçek portu yakalar.
              IPv4, IPv6 (köşeli parantez) ve domain destekler.
              """
              # Pattern: protocol://[userinfo@]host:port[?params][#tag]
              # (?:(?:[^@/]+)@)? -> opsiyonel userinfo@
              # (\[[^\]]+\]|[^:?/#]+) -> host: ya [IPv6] ya da normal host (domain/IPv4)
              # :(\d+) -> port numarası (sadece rakamlar)
              pattern = r'^[a-z0-9]+://(?:[^@/]+@)?(\[[^\]]+\]|[^:?/#]+):(\d+)'
              match = re.match(pattern, line.strip(), re.IGNORECASE)
              if match:
                  port = match.group(2).strip()
                  return port in ('80', '443')
              return False

          def is_valid_config(line):
              """Her protokol tipini doğru şekilde ayrıştırır."""
              line = line.strip()
              if not line or '://' not in line:
                  return False
              
              low = line.lower()
              if low.startswith('vmess://'):
                  return is_port_80_or_443_vmess(line)
              
              other_protocols = ['vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']
              if any(low.startswith(p) for p in other_protocols):
                  return is_port_80_or_443_other(line)
              
              return False

          def main():
              print("🚀 Eşzamanlı indirme başlatılıyor...")
              
              # 1. EŞZAMANLI İNDİRME
              contents = []
              with ThreadPoolExecutor(max_workers=4) as executor:
                  futures = {executor.submit(fetch_url, url): url for url in URLS}
                  for future in as_completed(futures):
                      result = future.result()
                      if result:
                          contents.append(result)
              
              if not contents:
                  print("❌ Hiçbir kaynak indirilemedi. sub.txt oluşturulmuyor.")
                  return
              
              # 2. FİLTRELEME
              all_configs = []
              for content in contents:
                  for line in content.splitlines():
                      if is_validconfig(line):
                          all_configs.append(line.strip())
              
              # 3. TEKİLLEŞTİRME (sıra korunur)
              seen = set()
              unique_configs = []
              for cfg in all_configs:
                  if cfg not in seen:
                      seen.add(cfg)
                      unique_configs.append(cfg)
              
              print(f"✅ Toplam ham config: {len(all_configs)}")
              print(f"✅ Filtrelenmiş ve benzersiz config (port 80/443): {len(unique_configs)}")
              
              # 4. BASE64 ENCODE VE DOSYAYA YAZMA
              combined = '\n'.join(unique_configs)
              encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
              
              with open('sub.txt', 'w', encoding='utf-8') as f:
                  f.write(encoded)
              
              print(f"💾 sub.txt başarıyla oluşturuldu ({len(encoded)} karakter base64)")

          if __name__ == '__main__':
              main()
          PYTHON_SCRIPT

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add sub.txt
          
          # Değişiklik var mı kontrol et (gereksiz commit'leri önler)
          if git diff --cached --quiet; then
            echo "📌 sub.txt'de değişiklik yok, commit atlanıyor."
          else
            git commit -m "♻️ Auto-update: Port 80/443 filtreli abonelikler [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ sub.txt başarıyla commit edildi ve pushlandı."
          fi

