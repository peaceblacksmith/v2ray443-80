name: V2ray Advanced Port Filter

on:
  schedule:
    - cron: '0 * * * *' # Tam olarak her saatin başında otomatik çalışır
  workflow_dispatch: # İstediğin an elinle başlatma butonu aktif

# Gelecekteki Node 24 zorunluluğunu şimdiden kabul etmek için ortam değişkeni ekliyoruz
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v4.2.2 # Node 24 uyumlu en güncel alt sürüm

    - name: Python Kur
      uses: actions/setup-python@v5.3.0 # Node 24 uyumlu en güncel alt sürüm
      with:
        python-version: '3.11' # Kararlı ve hızlı bir Python sürümü sabitledik

    - name: Gelişmiş Filtreleme Scriptini Çalıştır
      run: |
        cat << 'EOF' > filter.py
        import urllib.request
        import base64
        import json
        import re

        urls = [
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
            "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt"
        ]

        valid_ports = {"80", "443"}
        filtered_configs = []

        for url in urls:
            try:
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=20) as response:
                    content = response.read().decode('utf-8', errors='ignore')
                    
                    try:
                        decoded_content = base64.b64decode(content.strip()).decode('utf-8', errors='ignore')
                        lines = decoded_content.splitlines()
                    except:
                        lines = content.splitlines()

                    for line in lines:
                        line = line.strip()
                        if not line:
                            continue
                        
                        if line.startswith("vmess://"):
                            try:
                                b64_part = line[8:]
                                b64_part += "=" * ((4 - len(b64_part) % 4) % 4)
                                config_json = json.loads(base64.b64decode(b64_part).decode('utf-8', errors='ignore'))
                                if str(config_json.get("port")) in valid_ports:
                                    filtered_configs.append(line)
                            except:
                                pass
                        
                        elif line.startswith(("vless://", "trojan://", "ss://", "hysteria2://", "hy2://", "tuic://")):
                            match = re.search(r'@([^:/]+):(\d+)', line)
                            if match:
                                port = match.group(2)
                                if port in valid_ports:
                                    filtered_configs.append(line)
                            else:
                                match_alt = re.search(r':(\d+)(?:\?|#|$)', line)
                                if match_alt and match_alt.group(1) in valid_ports:
                                    filtered_configs.append(line)
            except Exception as e:
                print(f"Hata oluştu ({url}): {e}")

        output_content = "\n".join(filtered_configs)
        b64_output = base64.b64encode(output_content.encode('utf-8')).decode('utf-8')
        
        with open("sub.txt", "w") as f:
            f.write(b64_output)
            
        print(f"Filtreleme bitti. Toplam 80/443 sunucu sayısı: {len(filtered_configs)}")
        EOF
        
        python filter.py

    - name: GitHub'a Geri Yükle
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add sub.txt
        git commit -m "Abonelik Güncellendi (Node 24): $(date)" || exit 0
        git push
