name: V2ray Subscription Filter & Merge

on:
  schedule:
    # Her saat başı çalışır (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # Manuel tetikleme için
  push:
    branches: [ main, master ]

jobs:
  filter-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # Node.js 20'den 24'e geçiş uyarısını bastırmak ve geleceğe uyumlu olmak için
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Filter & Merge Script
        run: |
          python3 << 'PYTHON_SCRIPT'
          import base64
          import json
          import re
          import sys
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import urllib.request
          import ssl

          # ==========================================
          # KAYNAK LİNKLERİ
          # ==========================================
          URLS = [
              "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
              "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt",
          ]

          # SSL hatalarını önlemek için gevşek context
          ssl_ctx = ssl.create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = ssl.CERT_NONE

          def fetch_url(url):
              """URL'yi eşzamanlı olarak indirir, hata olursa boş string döner."""
              try:
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  })
                  with urllib.request.urlopen(req, timeout=60, context=ssl_ctx) as response:
                      return response.read().decode('utf-8', errors='replace')
              except Exception as e:
                  print(f"WARNING: Failed to fetch {url}: {e}", file=sys.stderr)
                  return ""

          def check_vmess_port(line):
              """vmess:// için base64 decode + JSON parse ile port kontrolü."""
              try:
                  b64_data = line[8:].strip()
                  missing_padding = len(b64_data) % 4
                  if missing_padding:
                      b64_data += '=' * (4 - missing_padding)
                  decoded = base64.b64decode(b64_data).decode('utf-8', errors='replace')
                  data = json.loads(decoded)
                  port = str(data.get('port', '')).strip()
                  return port in ('80', '443')
              except Exception:
                  return False

          def check_other_port(line):
              """vless, trojan, ss, hysteria2, hy2, tuic için gelişmiş port ayrıştırma."""
              pattern = r'^[a-z0-9]+://(?:[^@/]+@)?(\[[^\]]+\]|[^:?/#]+):(\d+)'
              match = re.match(pattern, line.strip(), re.IGNORECASE)
              if match:
                  port = match.group(2).strip()
                  return port in ('80', '443')
              return False

          def is_valid_config(line):
              """Her protokol tipini doğru şekilde ayrıştırır."""
              line = line.strip()
              if not line or '://' not in line:
                  return False
              
              low = line.lower()
              if low.startswith('vmess://'):
                  return check_vmess_port(line)
              
              other_protocols = ['vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']
              if any(low.startswith(p) for p in other_protocols):
                  return check_other_port(line)
              
              return False

          def main():
              print("Starting download...")
              contents = []
              with ThreadPoolExecutor(max_workers=4) as executor:
                  futures = {executor.submit(fetch_url, url): url for url in URLS}
                  for future in as_completed(futures):
                      result = future.result()
                      if result:
                          contents.append(result)
              
              if not contents:
                  print("No sources downloaded.")
                  with open('sub.txt', 'w', encoding='utf-8') as f:
                      f.write('')
                  return
              
              all_configs = []
              for content in contents:
                  for line in content.splitlines():
                      if is_valid_config(line):
                          all_configs.append(line.strip())
              
              seen = set()
              unique_configs = []
              for cfg in all_configs:
                  if cfg not in seen:
                      seen.add(cfg)
                      unique_configs.append(cfg)
              
              print(f"Total raw configs: {len(all_configs)}")
              print(f"Filtered unique configs (port 80/443): {len(unique_configs)}")
              
              combined = '\n'.join(unique_configs)
              encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
              
              with open('sub.txt', 'w', encoding='utf-8') as f:
                  f.write(encoded)
              
              print("sub.txt created successfully.")

          if __name__ == '__main__':
              try:
                  main()
              except Exception as e:
                  print(f"FATAL ERROR: {e}", file=sys.stderr)
                  sys.exit(1)
          PYTHON_SCRIPT

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add sub.txt
          
          # Değişiklik var mı kontrol et (gereksiz commit'leri önler)
          if git diff --cached --quiet; then
            echo "Degisiklik yok, commit atlaniyor."
          else
            git commit -m "Auto-update sub.txt [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "sub.txt basariyla commit edildi."
          fi

