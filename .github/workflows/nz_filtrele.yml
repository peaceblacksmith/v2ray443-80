name: New Zealand V2ray Filter (Hardened)

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  filter-nz:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          # Belirli, kararlı sürümler kullanılarak uyumsuzluk önlenir
          pip install geoip2==4.8.0 maxminddb==2.5.2 --quiet

      - name: Download & Verify GeoLite2 Country Database
        run: |
          echo "📥 GeoIP veritabani indiriliyor..."
          
          # En güvenilir 3 kaynak (Sırayla dener, başarılı olan ilk kaynakta durur)
          curl -L --max-time 120 --retry 3 -o GeoLite2-Country.mmdb \
            "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb" || \
          curl -L --max-time 120 --retry 3 -o GeoLite2-Country.mmdb \
            "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb" || \
          curl -L --max-time 120 --retry 3 -o GeoLite2-Country.mmdb \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-Country.mmdb"
            
          echo "🔍 Veritabani bütünlük kontrolü yapiliyor..."
          python3 -c "
          import geoip2.database
          import sys
          try:
              reader = geoip2.database.Reader('GeoLite2-Country.mmdb')
              # Bilinen bir IP (Google DNS) ile veritabaninin Country modunda calistigini test et
              resp = reader.country('8.8.8.8')
              if resp.country.iso_code != 'US':
                  print('HATA: Veritabani beklenen sonucu vermedi!', file=sys.stderr)
                  sys.exit(1)
              reader.close()
              print('✅ Veritabani gecerli ve Country modunda calisiyor.')
          except Exception as e:
              print(f'❌ Veritabani hatali veya bozuk: {e}', file=sys.stderr)
              sys.exit(1)
          "
          ls -lh GeoLite2-Country.mmdb

      - name: Run NZ Filter Script
        run: |
          python3 << 'PYTHON_SCRIPT'
          import base64
          import json
          import re
          import sys
          import socket
          import datetime
          import traceback
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import urllib.request
          import ssl
          import geoip2.database

          URLS = [
              "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
              "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt",
          ]

          ssl_ctx = ssl.create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = ssl.CERT_NONE

          geoip_reader = None

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60, context=ssl_ctx) as response:
                      return response.read().decode('utf-8', errors='replace')
              except Exception as e:
                  return ""

          def resolve_to_ip(host):
              host = host.strip()
              if not host: return None
              # Zaten IP ise
              try:
                  socket.inet_aton(host)
                  return host
              except socket.error: pass
              try:
                  socket.inet_pton(socket.AF_INET6, host)
                  return host
              except socket.error: pass
              # Domain ise DNS sorgula
              try:
                  results = socket.getaddrinfo(host, None, socket.AF_UNSPEC, socket.SOCK_STREAM)
                  for family, _, _, _, sockaddr in results:
                      ip = sockaddr[0]
                      # Özel ağ IP'lerini ele
                      if (ip.startswith(('127.', '10.', '192.168.', '172.', '0.')) or 
                          ip == '::1' or ip.startswith('fe80:')):
                          continue
                      return ip
                  return None
              except Exception:
                  return None

          def extract_host_vmess(line):
              try:
                  b64_data = line[8:].strip()
                  b64_data += '=' * (-len(b64_data) % 4)
                  decoded = base64.b64decode(b64_data).decode('utf-8', errors='replace')
                  data = json.loads(decoded)
                  return data.get('add', '').strip() or None
              except Exception:
                  return None

          def extract_host_other(line):
              pattern = r'^[a-z0-9]+://(?:[^@/]+@)?(\[[^\]]+\]|[^:?/#]+)'
              match = re.match(pattern, line.strip(), re.IGNORECASE)
              if match:
                  host = match.group(1).strip()
                  if host.startswith('[') and host.endswith(']'):
                      host = host[1:-1]
                  return host or None
              return None

          def extract_host(line):
              line = line.strip()
              if not line or '://' not in line: return None
              low = line.lower()
              if low.startswith('vmess://'): return extract_host_vmess(line)
              if any(low.startswith(p) for p in ['vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']):
                  return extract_host_other(line)
              return None

          def check_config(cfg, reader, debug_list):
              host = extract_host(cfg)
              if not host: return None
              ip = resolve_to_ip(host)
              if not ip: return None
              
              try:
                  response = reader.country(ip)
                  country_code = response.country.iso_code
                  
                  # Sadece ve sadece NZ ise kabul et
                  if country_code == 'NZ':
                      # İlk 3 sonucu logla ki doğruluğu görelim
                      if len(debug_list) < 3:
                          debug_list.append(f"✅ NZ MATCH: {host} -> IP: {ip} (Code: {country_code})")
                      return cfg
              except Exception:
                  pass
              return None

          def main():
              global geoip_reader
              print("🔄 Kaynaklar indiriliyor...")
              contents = []
              with ThreadPoolExecutor(max_workers=4) as executor:
                  futures = {executor.submit(fetch_url, url): url for url in URLS}
                  for future in as_completed(futures):
                      result = future.result()
                      if result: contents.append(result)
              
              print(f"✅ Kaynaklar: {len(contents)}/{len(URLS)}")
              if not contents:
                  with open('nz_sub.txt', 'w', encoding='utf-8') as f: f.write('')
                  return
              
              print("📚 GeoIP veritabani yukleniyor...")
              geoip_reader = geoip2.database.Reader('GeoLite2-Country.mmdb')
              
              all_configs = []
              for content in contents:
                  for line in content.splitlines():
                      line = line.strip()
                      if line and '://' in line:
                          low = line.lower()
                          if any(low.startswith(p) for p in ['vmess://', 'vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']):
                              all_configs.append(line)
              
              print(f"📊 Taranacak config sayisi: {len(all_configs)}")
              
              nz_configs = []
              debug_list = []
              checked = 0
              
              with ThreadPoolExecutor(max_workers=50) as executor:
                  futures = {executor.submit(check_config, cfg, geoip_reader, debug_list): cfg for cfg in all_configs}
                  for future in as_completed(futures):
                      result = future.result()
                      if result: nz_configs.append(result)
                      checked += 1
                      if checked % 2000 == 0:
                          print(f"🔍 İlerleme: {checked}/{len(all_configs)} tarandi, {len(nz_configs)} NZ bulundu")
              
              print(f"🎯 Bulunan NZ config sayisi: {len(nz_configs)}")
              
              # Debug bilgilerini yazdır
              if debug_list:
                  print("\n🔍 DEBUG: İlk bulunan NZ sunucularinin IP dogrulama logu:")
                  for log in debug_list:
                      print(log)
              else:
                  print("\n⚠️ UYARI: Hiçbir sunucu NZ olarak dogrulanamadi. Veritabani veya IP'ler supheli.")
              
              seen = set()
              unique_nz = [cfg for cfg in nz_configs if not (cfg in seen or seen.add(cfg))]
              print(f"✅ Tekil (Unique) NZ config sayisi: {len(unique_nz)}")
              
              timestamp = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
              combined = '\n'.join(unique_nz) + f'\n# Last updated: {timestamp}\n' if unique_nz else f'# No NZ servers found at {timestamp}\n'
              
              with open('nz_sub.txt', 'w', encoding='utf-8') as f:
                  f.write(base64.b64encode(combined.encode('utf-8')).decode('utf-8'))
              
              print(f"💾 nz_sub.txt basariyla olusturuldu.")

          if __name__ == '__main__':
              try:
                  main()
              except Exception as e:
                  print(f"\n❌ FATAL HATA: {e}", file=sys.stderr)
                  traceback.print_exc(file=sys.stderr)
                  sys.exit(1)
              finally:
                  if geoip_reader:
                      try: geoip_reader.close()
                      except: pass
          PYTHON_SCRIPT

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add nz_sub.txt
          if git diff --cached --quiet; then
            echo "⚠️ Degisiklik yok, commit atlaniyor."
          else
            git commit -m "🇳🇿 NZ update (IP verified) [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD
            echo "✅ nz_sub.txt basariyla commit edildi."
          fi

