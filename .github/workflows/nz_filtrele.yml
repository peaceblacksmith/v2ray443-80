name: New Zealand V2ray Filter

on:
  schedule:
    - cron: '30 * * * *'  # Diğer workflow ile çakışmasın diye :30
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  filter-nz:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install GeoIP2
        run: pip install geoip2 --quiet

      - name: Download GeoLite2 Country Database
        run: |
          echo "📥 GeoIP veritabani indiriliyor (5-8 MB)..."
          # 5 farklı güvenilir CDN fallback sistemi
          curl -L --max-time 180 --retry 3 --retry-delay 5 -o GeoLite2-Country.mmdb \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-Country.mmdb" && exit 0
          
          curl -L --max-time 180 --retry 3 --retry-delay 5 -o GeoLite2-Country.mmdb \
            "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb" && exit 0
          
          curl -L --max-time 180 --retry 3 --retry-delay 5 -o GeoLite2-Country.mmdb \
            "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb" && exit 0
          
          curl -L --max-time 180 --retry 3 --retry-delay 5 -o GeoLite2-Country.mmdb \
            "https://cdn.statically.io/gh/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb" && exit 0
          
          curl -L --max-time 180 --retry 3 --retry-delay 5 -o GeoLite2-Country.mmdb \
            "https://mirror.ghproxy.com/https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb" && exit 0
          
          echo "❌ Hiçbir MMDB mirror'u çalışmadı!"
          exit 1
          
          ls -lh GeoLite2-Country.mmdb

      - name: Run NZ Filter Script
        run: |
          python3 << 'PYTHON_SCRIPT'
          import base64
          import json
          import re
          import sys
          import socket
          import datetime
          import traceback
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import urllib.request
          import ssl
          import geoip2.database

          URLS = [
              "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
              "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt",
          ]

          ssl_ctx = ssl.create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = ssl.CERT_NONE

          geoip_reader = None

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  })
                  with urllib.request.urlopen(req, timeout=60, context=ssl_ctx) as response:
                      return response.read().decode('utf-8', errors='replace')
              except Exception as e:
                  print(f"WARNING: Failed to fetch {url}: {e}", file=sys.stderr)
                  return ""

          def resolve_to_ip(host):
              host = host.strip()
              if not host:
                  return None
              try:
                  socket.inet_aton(host)
                  return host
              except socket.error:
                  pass
              try:
                  socket.inet_pton(socket.AF_INET6, host)
                  return host
              except socket.error:
                  pass
              try:
                  results = socket.getaddrinfo(host, None, socket.AF_UNSPEC, socket.SOCK_STREAM)
                  for family, _, _, _, sockaddr in results:
                      ip = sockaddr[0]
                      if (ip.startswith('127.') or ip.startswith('10.') or 
                          ip.startswith('192.168.') or ip.startswith('172.') or
                          ip.startswith('0.')):
                          continue
                      if ip == '::1' or ip.startswith('fe80:'):
                          continue
                      return ip
                  return None
              except Exception:
                  return None

          def is_ip_in_nz(ip, reader):
              try:
                  response = reader.country(ip)
                  return response.country.iso_code == 'NZ'
              except Exception:
                  return False

          def extract_host_vmess(line):
              try:
                  b64_data = line[8:].strip()
                  missing_padding = len(b64_data) % 4
                  if missing_padding:
                      b64_data += '=' * (4 - missing_padding)
                  decoded = base64.b64decode(b64_data).decode('utf-8', errors='replace')
                  data = json.loads(decoded)
                  host = data.get('add', '').strip()
                  return host if host else None
              except Exception:
                  return None

          def extract_host_other(line):
              pattern = r'^[a-z0-9]+://(?:[^@/]+@)?(\[[^\]]+\]|[^:?/#]+)'
              match = re.match(pattern, line.strip(), re.IGNORECASE)
              if match:
                  host = match.group(1).strip()
                  if host.startswith('[') and host.endswith(']'):
                      host = host[1:-1]
                  return host if host else None
              return None

          def extract_host(line):
              line = line.strip()
              if not line or '://' not in line:
                  return None
              low = line.lower()
              if low.startswith('vmess://'):
                  return extract_host_vmess(line)
              other_protocols = ['vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']
              if any(low.startswith(p) for p in other_protocols):
                  return extract_host_other(line)
              return None

          def check_config(cfg, reader):
              host = extract_host(cfg)
              if not host:
                  return None
              ip = resolve_to_ip(host)
              if not ip:
                  return None
              if is_ip_in_nz(ip, reader):
                  return cfg
              return None

          def main():
              global geoip_reader
              
              print("🔄 Starting download...")
              contents = []
              with ThreadPoolExecutor(max_workers=4) as executor:
                  futures = {executor.submit(fetch_url, url): url for url in URLS}
                  for future in as_completed(futures):
                      result = future.result()
                      if result:
                          contents.append(result)
              
              print(f"✅ Sources fetched: {len(contents)}/{len(URLS)}")
              
              if not contents:
                  print("❌ No sources downloaded.")
                  with open('nz_sub.txt', 'w', encoding='utf-8') as f:
                      f.write('')
                  return
              
              print("📚 Loading GeoIP database...")
              geoip_reader = geoip2.database.Reader('GeoLite2-Country.mmdb')
              print("✅ GeoIP database loaded.")
              
              all_configs = []
              for content in contents:
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or '://' not in line:
                          continue
                      low = line.lower()
                      valid_protocols = ['vmess://', 'vless://', 'trojan://', 'ss://', 
                                         'hysteria2://', 'hy2://', 'tuic://']
                      if any(low.startswith(p) for p in valid_protocols):
                          all_configs.append(line)
              
              print(f"📊 Total valid configs to check: {len(all_configs)}")
              
              nz_configs = []
              checked = 0
              
              with ThreadPoolExecutor(max_workers=50) as executor:
                  futures = {executor.submit(check_config, cfg, geoip_reader): cfg 
                            for cfg in all_configs}
                  for future in as_completed(futures):
                      try:
                          result = future.result()
                          if result:
                              nz_configs.append(result)
                      except Exception as e:
                          pass
                      checked += 1
                      if checked % 1000 == 0:
                          print(f"🔍 Progress: {checked}/{len(all_configs)} checked, {len(nz_configs)} NZ found")
              
              print(f"🎯 NZ configs found: {len(nz_configs)}")
              
              seen = set()
              unique_nz = []
              for cfg in nz_configs:
                  if cfg not in seen:
                      seen.add(cfg)
                      unique_nz.append(cfg)
              
              print(f"✅ Unique NZ configs: {len(unique_nz)}")
              
              timestamp = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
              if unique_nz:
                  combined = '\n'.join(unique_nz) + f'\n# Last updated: {timestamp}\n'
              else:
                  combined = f'# No NZ servers found at {timestamp}\n'
              
              encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
              
              with open('nz_sub.txt', 'w', encoding='utf-8') as f:
                  f.write(encoded)
              
              print(f"💾 nz_sub.txt created successfully.")

          if __name__ == '__main__':
              try:
                  main()
              except Exception as e:
                  print(f"\n❌ FATAL ERROR: {e}", file=sys.stderr)
                  print("\n📋 FULL TRACEBACK:", file=sys.stderr)
                  traceback.print_exc(file=sys.stderr)
                  sys.exit(1)
              finally:
                  if geoip_reader is not None:
                      try:
                          geoip_reader.close()
                      except Exception:
                          pass
          PYTHON_SCRIPT

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add nz_sub.txt
          if git diff --cached --quiet; then
            echo "⚠️ Degisiklik yok, commit atlaniyor."
          else
            git commit -m "🇳🇿 NZ update [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD
            echo "✅ nz_sub.txt basariyla commit edildi."
          fi

