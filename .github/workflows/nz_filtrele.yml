name: New Zealand V2ray Filter

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  filter-nz:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geoip2==4.8.0 maxminddb==2.5.2

      - name: Create Filter Script
        run: |
          cat > nz_filter.py << 'PYEOF'
          import base64
          import json
          import re
          import sys
          import socket
          import ssl
          import datetime
          import urllib.request
          import os
          import traceback
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import geoip2.database

          DB_URL = "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb"
          DB_PATH = "GeoLite2-Country.mmdb"
          URLS = [
              "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
              "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt",
          ]

          ssl_ctx = ssl.create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = ssl.CERT_NONE

          def download_db():
              print("📥 GeoIP Veritabanı indiriliyor...")
              try:
                  req = urllib.request.Request(DB_URL, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=120, context=ssl_ctx) as response:
                      with open(DB_PATH, 'wb') as f:
                          f.write(response.read())
                  size = os.path.getsize(DB_PATH)
                  print(f"✅ İndirildi. Boyut: {size / 1024 / 1024:.2f} MB")
                  if size < 2000000:
                      raise Exception(f"Dosya çok küçük ({size} byte).")
              except Exception as e:
                  print(f"❌ DB HATASI: {e}")
                  sys.exit(1)

              print("🔍 Veritabanı doğrulanıyor...")
              try:
                  reader = geoip2.database.Reader(DB_PATH)
                  tests = [
                      ('8.8.8.8', 'US'),
                      ('1.1.1.1', 'AU'),
                      ('223.119.8.1', 'NZ'),  # Spark New Zealand IP
                  ]
                  for ip, expected in tests:
                      try:
                          resp = reader.country(ip)
                          code = resp.country.iso_code
                          if code != expected:
                              print(f"⚠️  UYARI: {ip} -> Beklenen: {expected}, Alınan: {code}")
                          else:
                              print(f"✅ {ip} -> {code} (Doğru)")
                      except Exception:
                          pass
                  reader.close()
              except Exception as e:
                  print(f"❌ DB DOĞRULAMA HATASI: {e}")
                  sys.exit(1)

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60, context=ssl_ctx) as response:
                      return response.read().decode('utf-8', errors='replace')
              except Exception:
                  return ""

          def resolve_to_ip(host):
              host = host.strip()
              if not host:
                  return None
              try:
                  socket.inet_aton(host)
                  return host
              except socket.error:
                  pass
              try:
                  socket.inet_pton(socket.AF_INET6, host)
                  return host
              except socket.error:
                  pass
              try:
                  results = socket.getaddrinfo(host, None, socket.AF_UNSPEC, socket.SOCK_STREAM)
                  for family, _, _, _, sockaddr in results:
                      ip = sockaddr[0]
                      if ip.startswith(('127.', '10.', '192.168.', '172.', '0.')) or ip == '::1' or ip.startswith('fe80:'):
                          continue
                      return ip
              except Exception:
                  pass
              return None

          def extract_host_vmess(line):
              try:
                  b64 = line[8:].strip()
                  b64 += '=' * (-len(b64) % 4)
                  data = json.loads(base64.b64decode(b64).decode('utf-8', errors='replace'))
                  return data.get('add', '').strip() or None
              except Exception:
                  return None

          def extract_host_other(line):
              m = re.match(r'^[a-z0-9]+://(?:[^@/]+@)?(\[[^\]]+\]|[^:?/#]+)', line.strip(), re.IGNORECASE)
              if m:
                  h = m.group(1).strip()
                  if h.startswith('[') and h.endswith(']'):
                      h = h[1:-1]
                  return h or None
              return None

          def extract_host(line):
              line = line.strip()
              if not line or '://' not in line:
                  return None
              low = line.lower()
              if low.startswith('vmess://'):
                  return extract_host_vmess(line)
              if any(low.startswith(p) for p in ['vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']):
                  return extract_host_other(line)
              return None

          def check_nz(cfg, reader):
              host = extract_host(cfg)
              if not host:
                  return None
              ip = resolve_to_ip(host)
              if not ip:
                  return None
              try:
                  resp = reader.country(ip)
                  code = resp.country.iso_code
                  name = resp.country.name
                  if code == 'NZ':
                      return (cfg, host, ip, code, name)
              except Exception:
                  pass
              return None

          def main():
              download_db()

              print("\n🔄 Abonelikler indiriliyor...")
              contents = []
              with ThreadPoolExecutor(max_workers=4) as ex:
                  futs = {ex.submit(fetch_url, u): u for u in URLS}
                  for f in as_completed(futs):
                      r = f.result()
                      if r:
                          contents.append(r)
              print(f"✅ Kaynaklar: {len(contents)}/{len(URLS)}")

              if not contents:
                  with open('nz_sub.txt', 'w') as f:
                      f.write('')
                  return

              reader = geoip2.database.Reader(DB_PATH)
              protos = ['vmess://', 'vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']
              configs = []
              for c in contents:
                  for line in c.splitlines():
                      line = line.strip()
                      if line and '://' in line and any(line.lower().startswith(p) for p in protos):
                          configs.append(line)
              print(f"📊 Taranacak: {len(configs)} config")

              nz_results = []
              done = 0
              with ThreadPoolExecutor(max_workers=50) as ex:
                  futs = {ex.submit(check_nz, c, reader): c for c in configs}
                  for f in as_completed(futs):
                      r = f.result()
                      if r:
                          nz_results.append(r)
                      done += 1
                      if done % 2000 == 0:
                          print(f"⏳ {done}/{len(configs)} | NZ: {len(nz_results)}")

              print(f"\n{'='*60}")
              print(f"🎯 TOPLAM NZ SUNUCU: {len(nz_results)}")
              print(f"{'='*60}")

              # Tekilleştirme ve detaylı log
              seen = set()
              unique_results = []
              for cfg, host, ip, code, name in nz_results:
                  if cfg not in seen:
                      seen.add(cfg)
                      unique_results.append((cfg, host, ip, code, name))

              print(f"✅ TEKİL NZ: {len(unique_results)}")

              if unique_results:
                  print(f"\n🔍 DOĞRULANMIŞ SUNUCU LİSTESİ:")
                  print(f"{'No':<4} {'IP Adresi':<18} {'Domain/Host':<40} {'Kod':<4} {'Ülke'}")
                  print(f"{'-'*4} {'-'*18} {'-'*40} {'-'*4} {'-'*20}")
                  for i, (cfg, host, ip, code, name) in enumerate(unique_results, 1):
                      host_display = host if len(host) <= 38 else host[:35] + "..."
                      print(f"{i:<4} {ip:<18} {host_display:<40} {code:<4} {name}")

              # nz_sub.txt oluştur
              ts = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
              
              # Manifesto ve doğrulama bilgisi
              lines = []
              lines.append(f"# IP-VERIFIED NEW ZEALAND SERVERS")
              lines.append(f"# Generated: {ts}")
              lines.append(f"# Total: {len(unique_results)} servers")
              lines.append(f"# Method: DNS resolve + GeoLite2-Country MMDB lookup")
              lines.append(f"# All IPs verified to be registered in New Zealand (NZ)")
              lines.append(f"#")
              
              for cfg, host, ip, code, name in unique_results:
                  # Her sunucudan önce doğrulama bilgisi (yorum satırı)
                  lines.append(f"# Verified: {host} -> {ip} [{code}] {name}")
                  lines.append(cfg)
              
              lines.append(f"# End of list")
              
              combined = '\n'.join(lines) + '\n'
              encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
              
              with open('nz_sub.txt', 'w') as f:
                  f.write(encoded)
              
              print(f"\n💾 nz_sub.txt oluşturuldu.")
              print(f"📋 Dosya içeriği (Base64 decode edince görülecek manifesto):")
              for line in lines[:7]:
                  print(f"   {line}")
              
              reader.close()

          if __name__ == '__main__':
              try:
                  main()
              except Exception as e:
                  print(f"\n❌ FATAL: {e}")
                  traceback.print_exc()
                  sys.exit(1)
          PYEOF

      - name: Execute Filter Script
        run: python3 nz_filter.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add nz_sub.txt
          if git diff --cached --quiet; then
            echo "⚠️ Değişiklik yok, commit atlanıyor."
          else
            git commit -m "🇳🇿 NZ update (IP verified) [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD
            echo "✅ nz_sub.txt commit edildi."
          fi

