name: New Zealand V2ray Filter

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  filter-nz:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install geoip2
        run: |
          echo "📦 pip kurulumu başlıyor..."
          python -m pip install --upgrade pip
          pip install geoip2 maxminddb
          echo "✅ pip kurulumu tamamlandı"
          python -c "import geoip2; print(f'geoip2 sürümü: {geoip2.__version__}')"

      - name: Download GeoIP Database
        run: |
          echo "📥 GeoIP DB indiriliyor..."
          python -c "
          import urllib.request
          import os
          import sys
          
          url = 'https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb'
          path = 'GeoLite2-Country.mmdb'
          
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=120) as response:
                  with open(path, 'wb') as f:
                      f.write(response.read())
              size = os.path.getsize(path)
              print(f'✅ İndirildi: {size / 1024 / 1024:.2f} MB')
              if size < 2000000:
                  print('❌ HATA: Dosya çok küçük, bozuk olabilir')
                  sys.exit(1)
          except Exception as e:
              print(f'❌ İndirme hatası: {e}')
              sys.exit(1)
          "
          ls -lh GeoLite2-Country.mmdb

      - name: Verify Database
        run: |
          echo "🔍 Veritabanı test ediliyor..."
          python -c "
          import geoip2.database
          import sys
          
          try:
              reader = geoip2.database.Reader('GeoLite2-Country.mmdb')
              resp = reader.country('8.8.8.8')
              code = resp.country.iso_code
              print(f'✅ 8.8.8.8 -> {code}')
              if code != 'US':
                  print(f'❌ HATA: Beklenen US, alınan {code}')
                  sys.exit(1)
              reader.close()
              print('✅ Veritabanı geçerli')
          except Exception as e:
              print(f'❌ Test hatası: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Run NZ Filter
        run: |
          echo "🚀 Filtreleme başlıyor..."
          python << 'PYTHON_SCRIPT'
          import base64
          import json
          import re
          import socket
          import ssl
          import datetime
          import urllib.request
          import geoip2.database
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import sys

          print("✅ Tüm modüller başarıyla import edildi")

          URLS = [
              "https://raw.githubusercontent.com/barry-far/V2ray-config/main/All_Configs_Sub.txt",
              "https://raw.githubusercontent.com/MatinGhanbari/v2ray-configs/main/subscriptions/v2ray/all_sub.txt",
          ]

          ssl_ctx = ssl.create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = ssl.CERT_NONE

          def fetch_url(url):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60, context=ssl_ctx) as response:
                      return response.read().decode('utf-8', errors='replace')
              except Exception as e:
                  print(f"⚠ {url}: {e}")
                  return ""

          def resolve_ip(host):
              if not host:
                  return None
              host = host.strip()
              try:
                  socket.inet_aton(host)
                  return host
              except:
                  pass
              try:
                  socket.inet_pton(socket.AF_INET6, host)
                  return host
              except:
                  pass
              try:
                  results = socket.getaddrinfo(host, None, socket.AF_UNSPEC, socket.SOCK_STREAM)
                  for family, _, _, _, sockaddr in results:
                      ip = sockaddr[0]
                      if not ip.startswith(('127.', '10.', '192.168.', '172.', '0.')) and ip != '::1' and not ip.startswith('fe80:'):
                          return ip
              except:
                  pass
              return None

          def get_host_vmess(line):
              try:
                  b64 = line[8:].strip()
                  b64 += '=' * (-len(b64) % 4)
                  data = json.loads(base64.b64decode(b64).decode('utf-8', errors='replace'))
                  return data.get('add', '').strip() or None
              except:
                  return None

          def get_host_other(line):
              m = re.match(r'^[a-z0-9]+://(?:[^@/]+@)?(\[[^\]]+\]|[^:?/#]+)', line.strip(), re.IGNORECASE)
              if m:
                  h = m.group(1).strip()
                  if h.startswith('[') and h.endswith(']'):
                      h = h[1:-1]
                  return h or None
              return None

          def get_host(line):
              line = line.strip()
              if not line or '://' not in line:
                  return None
              low = line.lower()
              if low.startswith('vmess://'):
                  return get_host_vmess(line)
              if any(low.startswith(p) for p in ['vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']):
                  return get_host_other(line)
              return None

          def check_nz(cfg, reader):
              try:
                  host = get_host(cfg)
                  if not host:
                      return None
                  ip = resolve_ip(host)
                  if not ip:
                      return None
                  resp = reader.country(ip)
                  if resp.country.iso_code == 'NZ':
                      return (cfg, host, ip)
              except:
                  pass
              return None

          print("🔄 Kaynaklar indiriliyor...")
          contents = []
          with ThreadPoolExecutor(max_workers=4) as ex:
              futs = {ex.submit(fetch_url, u): u for u in URLS}
              for f in as_completed(futs):
                  r = f.result()
                  if r:
                      contents.append(r)
          print(f"✅ Kaynaklar: {len(contents)}/{len(URLS)}")

          if not contents:
              print("❌ Hiçbir kaynak indirilemedi")
              with open('nz_sub.txt', 'w') as f:
                  f.write('')
              sys.exit(0)

          print("📚 GeoIP yükleniyor...")
          reader = geoip2.database.Reader('GeoLite2-Country.mmdb')
          print("✅ GeoIP hazır")

          protos = ['vmess://', 'vless://', 'trojan://', 'ss://', 'hysteria2://', 'hy2://', 'tuic://']
          configs = []
          for c in contents:
              for line in c.splitlines():
                  line = line.strip()
                  if line and '://' in line and any(line.lower().startswith(p) for p in protos):
                      configs.append(line)
          print(f"📊 Toplam config: {len(configs)}")

          nz_list = []
          done = 0
          print("🔍 NZ taraması başlıyor...")
          with ThreadPoolExecutor(max_workers=50) as ex:
              futs = {ex.submit(check_nz, c, reader): c for c in configs}
              for f in as_completed(futs):
                  r = f.result()
                  if r:
                      nz_list.append(r)
                  done += 1
                  if done % 2000 == 0:
                      print(f"⏳ {done}/{len(configs)} | NZ: {len(nz_list)}")

          print(f"\n🎯 Bulunan NZ: {len(nz_list)}")

          seen = set()
          unique = []
          for cfg, host, ip in nz_list:
              if cfg not in seen:
                  seen.add(cfg)
                  unique.append((cfg, host, ip))
          print(f"✅ Tekil NZ: {len(unique)}")

          if unique:
              print("\n🔍 Doğrulanmış NZ Sunucuları:")
              for i, (cfg, host, ip) in enumerate(unique[:10], 1):
                  print(f"  {i}. {host} -> {ip}")
              if len(unique) > 10:
                  print(f"  ... ve {len(unique) - 10} sunucu daha")

          ts = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
          lines = [f"# IP-VERIFIED NZ SERVERS - {ts}", f"# Total: {len(unique)}"]
          for cfg, host, ip in unique:
              lines.append(f"# {host} -> {ip} [NZ]")
              lines.append(cfg)
          
          combined = '\n'.join(lines) + '\n'
          encoded = base64.b64encode(combined.encode('utf-8')).decode('utf-8')
          
          with open('nz_sub.txt', 'w') as f:
              f.write(encoded)
          print(f"\n💾 nz_sub.txt oluşturuldu")
          reader.close()
          print("✅ İşlem tamamlandı")
          PYTHON_SCRIPT
          echo "🏁 Python scripti tamamlandı"

      - name: Commit and Push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add nz_sub.txt
          if git diff --cached --quiet; then
            echo "⚠️ Değişiklik yok"
          else
            git commit -m "🇳🇿 NZ update [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD
            echo "✅ Commit edildi"
          fi

